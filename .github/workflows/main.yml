name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Web Assets
        run: npm run build
        
      - name: Setup Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Generate Assets (Logo & Splash)
        run: |
          npm install @capacitor/assets
          npx @capacitor/assets generate --android

      - name: Inject Firebase Config
        run: |
          mkdir -p android/app
          cp google-services.json android/app/google-services.json
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Build Final APK
        run: |
          # Verify the file exists first (for debugging)
          ls -R Certificates/
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/Certificates/orgo.jks \
            -Pandroid.injected.signing.store.password=YOUR_PASSWORD \
            -Pandroid.injected.signing.key.alias=orgo-key \
            -Pandroid.injected.signing.key.password=YOUR_PASSWORD
          ./gradlew signingReport
          
          
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OrGo-Mobile-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
